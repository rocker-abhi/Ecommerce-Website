# Alembic Configuration File
# This file is read by the Alembic environment.
#
# The sqlalchemy.url is replaced at runtime by env.py from the DATABASE_URI
# environment variable, so the value here is just a placeholder.

[alembic]
script_location = migrations
sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
